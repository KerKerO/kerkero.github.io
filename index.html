<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AneaGames</title>
  <meta name="description" content="Projects and contacts for AneaGames.">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <style>
    :root {
      --card: rgba(21, 27, 39, 0.78);
      --card-strong: rgba(28, 36, 52, 0.92);
      --text: #f4f7fb;
      --muted: #aeb8c8;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #74d5ff;
      --accent-2: #ff7ee8;
      --accent-3: #ffcf5a;
      --danger: #ff5b7c;
      --radius: 28px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 8%, rgba(116, 213, 255, 0.28), transparent 34rem),
        radial-gradient(circle at 88% 16%, rgba(255, 126, 232, 0.18), transparent 30rem),
        radial-gradient(circle at 52% 100%, rgba(255, 207, 90, 0.12), transparent 34rem),
        linear-gradient(180deg, #080a0f 0%, #10141e 52%, #080a0f 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
      z-index: -1;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
    }

    .cat-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -1;
      opacity: 0.8;
    }

    .rotcat,
    .rotcat-s {
      position: absolute;
      width: 64px;
      height: 64px;
      image-rendering: auto;
      opacity: 0.85;
      filter: drop-shadow(0 0 18px rgba(116, 213, 255, 0.32));
    }

    .rotcat {
      left: 9%;
      top: 17%;
      animation: rot 27s linear infinite;
      transform-origin: 0 0;
    }

    .rotcat-s {
      left: 50%;
      top: 48%;
      animation: rotS 27s linear infinite;
    }

    @keyframes rot {
      from {
        transform: rotate(90deg);
      }

      to {
        transform: rotate(-270deg);
      }
    }

    @keyframes rotS {
      0% {
        transform: translate(-600px, 200px);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(400px, -127px);
        opacity: 0;
      }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(8, 10, 15, 0.72);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      width: min(calc(100% - 32px), var(--max));
      min-height: 76px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      font-weight: 900;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(116, 213, 255, 0.92), rgba(255, 126, 232, 0.88));
      color: #061018;
      box-shadow: 0 12px 34px rgba(116, 213, 255, 0.2);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav a {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .nav a:hover,
    .nav a.is-active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--line);
    }

    .hero {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: clamp(56px, 8vw, 106px) 0 clamp(42px, 8vw, 92px);
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(24px, 5vw, 72px);
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      padding: 7px 12px;
      border: 1px solid rgba(116, 213, 255, 0.28);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(116, 213, 255, 0.08);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
    }

    h1 {
      max-width: 12ch;
      margin: 0;
      font-size: clamp(3.2rem, 9vw, 8.6rem);
      line-height: 0.86;
      letter-spacing: -0.09em;
      text-wrap: balance;
      color: transparent;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 52%, var(--accent-3) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 24px rgba(116, 213, 255, 0.16));
    }

    .section {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: clamp(28px, 5vw, 56px) 0;
      scroll-margin-top: 96px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    h2 {
      margin: 6px 0 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .project-card {
      --project-accent: 116, 213, 255;
      position: relative;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 16%, rgba(var(--project-accent), 0.2), transparent 13rem),
        linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04)),
        var(--card);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
      overflow: hidden;
      text-decoration: none;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .project-card::before {
      content: attr(data-symbol);
      position: absolute;
      right: 18px;
      bottom: 10px;
      max-width: 58%;
      color: rgba(var(--project-accent), 0.11);
      font-size: clamp(5.4rem, 11vw, 9.2rem);
      font-weight: 950;
      line-height: 0.82;
      letter-spacing: -0.08em;
      text-align: right;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(var(--project-accent), 0.48);
      background:
        radial-gradient(circle at 18% 16%, rgba(var(--project-accent), 0.3), transparent 13rem),
        linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05)),
        var(--card-strong);
    }

    .project-card:hover .project-arrow {
      transform: translateX(4px);
    }

    .project-top,
    .project-bottom,
    .project-body {
      position: relative;
      z-index: 1;
    }

    .project-top,
    .project-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .project-tag,
    .project-platform {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid rgba(var(--project-accent), 0.32);
      border-radius: 999px;
      color: rgb(var(--project-accent));
      background: rgba(var(--project-accent), 0.09);
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.02em;
    }

    .project-platform {
      color: var(--muted);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.06);
    }

    .project-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      line-height: 0.9;
      letter-spacing: -0.075em;
    }

    .project-meta {
      max-width: 28ch;
      color: var(--muted);
      margin: 12px 0 0;
      font-size: 1rem;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgb(var(--project-accent));
      font-weight: 850;
    }

    .project-arrow {
      display: inline-block;
      transition: transform 0.18s ease;
    }

    .contact-card {
      max-width: 620px;
      min-height: 0;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 18% 16%, rgba(116, 213, 255, 0.16), transparent 12rem),
        linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04)),
        var(--card);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
    }

    .contacts {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .contact-link {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.07);
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .contact-link:hover {
      transform: translateY(-3px);
      border-color: rgba(116, 213, 255, 0.42);
      background: rgba(255, 255, 255, 0.11);
    }

    .contact-icon {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #061018;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 950;
      overflow: hidden;
    }

    .contact-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .contact-link strong {
      display: block;
      line-height: 1.15;
    }

    .contact-link span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .arrow {
      color: var(--accent);
      font-size: 1.5rem;
    }

    .footer {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
      padding: 44px 0 54px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
    }

    @media (max-width: 960px) {
      .projects-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .topbar-inner {
        min-height: auto;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }

      .nav a {
        padding-inline: 12px;
      }

      .hero {
        padding-top: 44px;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .contact-link {
        grid-template-columns: 44px 1fr;
      }

      .arrow {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="cat-layer" aria-hidden="true">
      <img src="assets/rotcat.gif" width="64" height="64" class="rotcat" alt="">
      <img src="assets/rotcat.gif" width="64" height="64" class="rotcat-s" alt="">
    </div>

    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="#top" aria-label="AneaGames">
          <span class="brand-mark">A</span>
          <span>AneaGames</span>
        </a>

        <nav class="nav" aria-label="Навигация по странице">
          <a href="#projects">Projects</a>
          <a href="#contacts">Contact</a>
        </nav>
      </div>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div>
          <span class="eyebrow">Game dev</span>
          <h1 id="hero-title">AneaGames</h1>
        </div>
      </section>

      <section class="section" id="projects" aria-labelledby="projects-title">
        <div class="section-head">
          <h2 id="projects-title">Projects</h2>
        </div>

        <div class="projects-grid" id="projectsGrid" aria-live="polite"></div>
      </section>

      <section class="section" id="contacts" aria-labelledby="contacts-title">
        <div class="section-head">
          <h2 id="contacts-title">Contact</h2>
        </div>

        <div class="contact-card">
          <div class="contacts" id="contactsGrid" aria-label="Контакты" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>© <span id="year"></span> AneaGames</span>
      <a href="#top">Наверх ↑</a>
    </footer>
  </div>

  <script>
    document.querySelector("#year").textContent = new Date().getFullYear();

    const FALLBACK_PROJECTS = [
      {
        title: "ICED",
        description: "Cold survival experience.",
        url: "http://store.steampowered.com/app/575570/ICED/",
        platform: "Steam",
        tags: ["Survival"],
        symbol: "I",
        accent: "cyan"
      },
      {
        title: "ICED VR",
        description: "Survival in virtual reality.",
        url: "https://store.steampowered.com/app/832420/ICED_VR/",
        platform: "Steam",
        tags: ["VR", "Survival"],
        symbol: "VR",
        accent: "pink"
      },
      {
        title: "Moto VR",
        description: "VR motorcycle ride.",
        url: "http://store.steampowered.com/app/713500/Moto_VR/",
        platform: "Steam",
        tags: ["VR", "Racing"],
        symbol: "M",
        accent: "yellow"
      },
      {
        title: "CrazyCars3D",
        description: "Arcade car action.",
        url: "http://store.steampowered.com/app/454180/CrazyCars3D/",
        platform: "Steam",
        tags: ["Racing", "Arcade"],
        symbol: "C",
        accent: "red"
      }
    ];

    const PROJECT_ACCENTS = {
      cyan: "116, 213, 255",
      pink: "255, 126, 232",
      yellow: "255, 207, 90",
      red: "255, 91, 124"
    };

    const FALLBACK_CONTACTS = [
      {
        title: "Discord",
        value: "discord.gg/3zHv6fk",
        url: "https://discord.gg/3zHv6fk",
        icon: "D",
        image: "assets/discord.png"
      },
      {
        title: "VK",
        value: "vk.com/anea_duo_dev",
        url: "https://vk.com/anea_duo_dev",
        icon: "VK",
        image: "assets/vk.png"
      }
    ];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeProject(project) {
      return {
        title: project.title || "Untitled",
        description: project.description || "",
        url: project.url || "#",
        platform: project.platform || "Steam",
        tags: Array.isArray(project.tags) ? project.tags : [],
        symbol: project.symbol || (project.title || "?").slice(0, 1),
        accent: PROJECT_ACCENTS[project.accent] || PROJECT_ACCENTS.cyan
      };
    }

    function renderProjects(projects) {
      const grid = document.querySelector("#projectsGrid");
      if (!grid) return;

      grid.innerHTML = projects.map(normalizeProject).map((project) => {
        const tags = project.tags
          .map((tag) => `<span class="project-tag">${escapeHtml(tag)}</span>`)
          .join("");

        return `
          <a class="project-card" href="${escapeHtml(project.url)}" target="_blank" rel="noopener" data-symbol="${escapeHtml(project.symbol)}" style="--project-accent: ${project.accent};">
            <div class="project-top">
              <div class="project-tags">${tags}</div>
              <span class="project-platform">${escapeHtml(project.platform)}</span>
            </div>
            <div class="project-body">
              <h3 class="project-title">${escapeHtml(project.title)}</h3>
              <p class="project-meta">${escapeHtml(project.description)}</p>
            </div>
            <div class="project-bottom">
              <span class="project-link">View on ${escapeHtml(project.platform)} <span class="project-arrow">→</span></span>
            </div>
          </a>
        `;
      }).join("");
    }

    function normalizeContact(contact) {
      return {
        title: contact.title || "Contact",
        value: contact.value || contact.url || "",
        url: contact.url || "#",
        icon: contact.icon || (contact.title || "?").slice(0, 1),
        image: contact.image || ""
      };
    }

    function renderContacts(contacts) {
      const grid = document.querySelector("#contactsGrid");
      if (!grid) return;

      grid.innerHTML = contacts.map(normalizeContact).map((contact) => {
        const icon = contact.image
          ? `<img src="${escapeHtml(contact.image)}" alt="" onerror="this.replaceWith(document.createTextNode('${escapeHtml(contact.icon)}'))">`
          : escapeHtml(contact.icon);

        return `
          <a class="contact-link" href="${escapeHtml(contact.url)}" target="_blank" rel="noopener">
            <span class="contact-icon">${icon}</span>
            <span>
              <strong>${escapeHtml(contact.title)}</strong>
              <span>${escapeHtml(contact.value)}</span>
            </span>
            <span class="arrow">→</span>
          </a>
        `;
      }).join("");
    }

    async function loadProjects() {
      try {
        const response = await fetch("projects.json", { cache: "no-store" });
        if (!response.ok) throw new Error("projects.json not found");
        const projects = await response.json();
        renderProjects(Array.isArray(projects) ? projects : projects.projects);
      } catch {
        renderProjects(FALLBACK_PROJECTS);
      }
    }

    async function loadContacts() {
      try {
        const response = await fetch("contacts.json", { cache: "no-store" });
        if (!response.ok) throw new Error("contacts.json not found");
        const contacts = await response.json();
        renderContacts(Array.isArray(contacts) ? contacts : contacts.contacts);
      } catch {
        renderContacts(FALLBACK_CONTACTS);
      }
    }

    loadProjects();
    loadContacts();


    const navLinks = [...document.querySelectorAll(".nav a")];
    const sections = navLinks
      .map((link) => document.querySelector(link.getAttribute("href")))
      .filter(Boolean);

    function setActiveNav(id) {
      navLinks.forEach((link) => {
        link.classList.toggle("is-active", link.getAttribute("href") === `#${id}`);
      });
    }

    function getCurrentSectionId() {
      const headerHeight = document.querySelector(".topbar")?.offsetHeight || 0;
      const checkpoint = window.scrollY + headerHeight + 48;
      const pageBottom = window.scrollY + window.innerHeight >= document.documentElement.scrollHeight - 4;

      if (pageBottom && sections.length) {
        return sections[sections.length - 1].id;
      }

      let currentId = sections[0]?.id;

      sections.forEach((section) => {
        if (section.offsetTop <= checkpoint) {
          currentId = section.id;
        }
      });

      return currentId;
    }

    let ticking = false;

    function updateActiveByScroll() {
      if (ticking) return;

      ticking = true;
      requestAnimationFrame(() => {
        const currentId = getCurrentSectionId();
        if (currentId) setActiveNav(currentId);
        ticking = false;
      });
    }

    navLinks.forEach((link) => {
      link.addEventListener("click", () => {
        const id = link.getAttribute("href").slice(1);
        setActiveNav(id);
      });
    });

    window.addEventListener("scroll", updateActiveByScroll, { passive: true });
    window.addEventListener("resize", updateActiveByScroll);
    window.addEventListener("hashchange", () => {
      const id = location.hash.slice(1);
      if (id) setActiveNav(id);
    });

    updateActiveByScroll();
  </script>
</body>

</html>
